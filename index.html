<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4f46e5">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="タスク管理">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./style.css">
  <title>タスク管理</title>
</head>
<body>
<div id="app">

  <!-- Storage warning -->
  <div id="storage-warning">
    ⚠️ データの永続化が許可されていません。定期的にエクスポートしてください。
  </div>

  <!-- Header -->
  <header>
    <h1>📋 タスク管理</h1>
    <button class="icon-btn" id="btn-email" title="メール送信">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
    </button>
    <button class="icon-btn" id="btn-export" title="エクスポート">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="7,10 12,15 17,10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </button>
    <button class="icon-btn" id="btn-settings" title="設定">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- Main task view -->
  <div id="task-view" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div id="tabs"></div>
    <div id="task-list"></div>
  </div>

  <!-- Settings screen -->
  <div id="settings-screen">
    <h2>⚙️ 設定</h2>
    <div class="form-group">
      <label>送信先メールアドレス</label>
      <input class="form-input" id="settings-email" type="email" placeholder="company@example.com">
    </div>
    <div class="form-group">
      <label>期限「未定」時のデフォルト日数</label>
      <input class="form-input" id="settings-days" type="number" min="1" max="365" value="14">
    </div>
    <div class="form-group">
      <label>Gemini APIキー <span style="font-size:11px;color:var(--text-muted)">（AI WBS分解・無料）</span></label>
      <input class="form-input" id="settings-gemini-key" type="password" placeholder="AIzaSy...">
      <div style="font-size:11px;color:var(--text-muted);margin-top:4px">
        <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener" style="color:var(--primary-light)">aistudio.google.com</a> で無料取得
      </div>
    </div>
    <div class="form-group">
      <label>データバックアップ</label>
      <button class="btn btn-secondary" id="settings-import-btn">JSONをインポート</button>
      <input type="file" id="import-file" accept=".json" style="display:none">
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="settings-back">戻る</button>
      <button class="btn btn-primary" id="settings-save">保存</button>
    </div>
  </div>

  <!-- FAB buttons -->
  <div id="fab-area">
    <button id="add-fab" aria-label="手動入力">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
    <button id="mic-fab" aria-label="音声入力">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
        <path d="M19 10v2a7 7 0 01-14 0v-2H3v2a9 9 0 008 8.94V23h2v-2.06A9 9 0 0021 12v-2h-2z"/>
      </svg>
    </button>
  </div>

</div>

<!-- ─── Task dialog (作成・編集 共通) ──────────── -->
<div id="task-overlay" class="overlay">
  <div class="sheet">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
      <h2 id="task-dialog-title" style="margin:0;flex:1">📝 タスクを登録</h2>
      <!-- 録音中インジケーター -->
      <div id="voice-wave">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>
    </div>

    <input type="hidden" id="td-id">

    <div class="form-group">
      <label>タスク内容 <span style="color:var(--danger)">*</span></label>
      <textarea class="form-input form-textarea" id="td-title" rows="2" placeholder="例：A社の見積書を作成する"></textarea>
    </div>

    <div class="form-group">
      <label>案件</label>
      <select class="form-select" id="td-project"></select>
      <input class="form-input" id="td-new-project" type="text" placeholder="＋ 新しい案件名" style="margin-top:6px">
    </div>

    <div class="form-group">
      <label>期限 <span style="color:var(--danger)">*</span></label>
      <div style="display:flex;gap:8px;align-items:center">
        <input class="form-input" id="td-deadline" type="date" style="flex:1">
        <button id="td-undecided" class="btn btn-secondary" style="flex:0;white-space:nowrap;padding:10px 12px;font-size:13px">未定（仮）</button>
      </div>
      <div id="td-provisional-note" style="display:none;font-size:12px;color:var(--primary-light);margin-top:4px">📌 仮の期限として登録されます</div>
    </div>

    <div class="form-group">
      <label>次のアクション</label>
      <input class="form-input" id="td-next-action" type="text" placeholder="例：先方にメールで確認する">
    </div>

    <div class="form-group">
      <label>備考・URL</label>
      <textarea class="form-input form-textarea" id="td-memo" rows="2" placeholder="URLやメモを入力…"></textarea>
    </div>

    <div class="btn-row">
      <button class="btn btn-secondary" id="td-cancel">キャンセル</button>
      <button class="btn btn-primary" id="td-save">登録</button>
    </div>
  </div>
</div>

<script type="module" src="./app.js"></script>
</body>
</html>
